name: Atualizar Dashboard SPIW

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install requests

      - name: Gerar dashboard
        env:
          SYMPLA_TOKEN: ${{ secrets.SYMPLA_TOKEN }}
        run: python generate.py

      - name: Commit e push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Dashboard atualizado $(TZ='America/Sao_Paulo' date '+%d/%m/%Y %H:%M')"
          git push
